<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Delta Web UI</title>
  <link rel="stylesheet" href="./styles.css" />
</head>
<body>
  <main class="page">
    <header class="header">
      <h1>Delta MVP</h1>
      <div class="header-row">
        <p id="stats">Type in the editor to update visualization.</p>
        <div class="header-toggles">
          <label class="compact-toggle" for="compactToggle">
            <input id="compactToggle" type="checkbox" checked />
            <span>Compact view</span>
          </label>
          <label class="compact-toggle" for="evaluationToggle">
            <input id="evaluationToggle" type="checkbox" />
            <span>Evaluation mode</span>
          </label>
        </div>
      </div>
    </header>

    <section class="split-layout">
      <section class="editor-wrap">
        <label for="editorInput">Input</label>
        <div class="editor-layer">
          <pre id="editorLineNumbers" aria-hidden="true"></pre>
          <pre id="editorHighlight" aria-hidden="true"></pre>
          <textarea id="editorInput" spellcheck="false"></textarea>
          <div id="editorCaretOverlay" aria-hidden="true"></div>
        </div>
      </section>
      <section class="graph-column">
        <section class="canvas-wrap">
          <div id="definitionBar" class="definition-bar"></div>
          <canvas id="vizCanvas" width="900" height="700"></canvas>
        </section>
        <section id="evaluationWrap" class="eval-trace-wrap hidden">
          <h2>Evaluation Chain</h2>
          <div id="evaluationOutput"></div>
        </section>
        <section class="report-wrap">
          <h2>Report</h2>
          <pre id="reportOutput">No diagnostics.</pre>
        </section>
      </section>
    </section>
  </main>
  <div id="hoverTooltip" aria-hidden="true"></div>

  <script>
    window.__deltaQueuedPayload = null;
    window.__deltaQueuedEditorText = null;
    window.renderFromHost = function(payload) {
      window.__deltaQueuedPayload = payload;
    };
    window.setEditorTextFromHost = function(text) {
      window.__deltaQueuedEditorText = text;
    };
  </script>
  <script src="./app/bridge.js"></script>
  <script src="./app/definitionBar.js"></script>
  <script src="./app/graph.js"></script>
  <script src="./app/renderer.js"></script>
  <script src="./app/reportPanel.js"></script>
  <script src="./app/evaluationPanel.js"></script>
  <script src="./editor/state.js"></script>
  <script src="./editor/textUtils.js"></script>
  <script src="./editor/overlay.js"></script>
  <script src="./editor/tooltips.js"></script>
  <script src="./editor/caretOverlay.js"></script>
  <script src="./editor/inputHandlers.js"></script>
  <script src="./graph/interactions.js"></script>
  <script src="./app/bootstrap.js"></script>
  <script src="./main.js"></script>
</body>
</html>
